<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 加入 PWA 相關標籤，如果使用者加到主畫面也能全螢幕 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>智慧門鈴道具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none;
            overflow: hidden;
            background-color: #e5e7eb;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .doorbell-body {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            box-shadow: 
                20px 20px 60px #c1c3c6,
                -20px -20px 60px #ffffff,
                inset 0px 2px 4px rgba(255,255,255,0.1);
            border: 2px solid #333;
        }

        .camera-lens {
            background: radial-gradient(circle at 30% 30%, #4a4a5a, #000 60%);
            box-shadow: inset 0 0 10px rgba(0,0,0,1), 0 2px 5px rgba(255,255,255,0.1);
        }
        
        .camera-lens::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 25%;
            height: 25%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(1px);
        }

        .doorbell-button {
            background: linear-gradient(145deg, #f3f4f6, #d1d5db);
            box-shadow: 
                0 12px 0 #9ca3af,
                0 15px 25px rgba(0,0,0,0.5),
                inset 0 -2px 5px rgba(0,0,0,0.1);
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            /* 防止選取 */
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .led-ring {
            box-shadow: inset 0 0 0 4px #e5e7eb;
            transition: all 0.2s ease;
        }

        .doorbell-button:active, .doorbell-button.pressed {
            transform: translateY(10px);
            box-shadow: 
                0 2px 0 #9ca3af,
                0 5px 10px rgba(0,0,0,0.5),
                inset 0 -2px 5px rgba(0,0,0,0.1);
        }

        .doorbell-button:active .led-ring, .doorbell-button.pressed .led-ring {
            box-shadow: inset 0 0 0 6px #3b82f6, 0 0 20px #3b82f6, inset 0 0 15px #3b82f6;
        }

        .bell-icon {
            transition: all 0.2s ease;
            fill: #4b5563;
        }

        .doorbell-button:active .bell-icon, .doorbell-button.pressed .bell-icon {
            fill: #1e3a8a;
        }

        /* 準備畫面遮罩 */
        #setup-overlay {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            z-index: 50;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center selection:bg-transparent relative" id="app-container">

    <!-- 準備畫面：點擊進入全螢幕 -->
    <div id="setup-overlay" class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-2xl font-bold mb-4 text-gray-800">準備拍攝</h1>
        <p class="text-gray-600 mb-8">請將手機音量調到最大，<br>並確認未開啟靜音模式。</p>
        <button id="fullscreen-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-full shadow-lg transition-transform transform active:scale-95 text-lg">
            開始拍攝 (進入全螢幕)
        </button>
        <p class="text-sm text-gray-400 mt-4">進入全螢幕後，點擊實體門鈴按鈕即可發聲。</p>
    </div>

    <!-- 門鈴本體 -->
    <div class="doorbell-body w-4/5 max-w-sm h-3/4 max-h-[700px] rounded-[3rem] flex flex-col items-center py-12 px-6 relative">
        
        <!-- 上方：鏡頭區 -->
        <div class="w-full flex justify-center flex-col items-center mb-auto">
            <div class="w-24 h-24 bg-gray-900 rounded-full flex items-center justify-center p-2 shadow-[0_5px_15px_rgba(0,0,0,0.5)]">
                <div class="camera-lens relative w-full h-full rounded-full border border-gray-800"></div>
            </div>
            <div class="w-3 h-3 bg-black rounded-full mt-6 shadow-inner opacity-80"></div>
            <div class="w-2 h-2 bg-black rounded-full mt-3 shadow-inner opacity-80"></div>
        </div>

        <!-- 下方：按鈕區 -->
        <div class="w-full flex justify-center mb-10">
            <button id="doorbell-btn" class="doorbell-button relative w-40 h-40 rounded-full flex items-center justify-center outline-none cursor-pointer">
                <div class="led-ring absolute inset-0 rounded-full pointer-events-none"></div>
                <svg class="bell-icon w-16 h-16 pointer-events-none z-10" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22C13.1 22 14 21.1 14 20H10C10 21.1 10.9 22 12 22ZM18 16V11C18 7.93 16.36 5.36 13.5 4.68V4C13.5 3.17 12.83 2.5 12 2.5C11.17 2.5 10.5 3.17 10.5 4V4.68C7.63 5.36 6 7.92 6 11V16L4 18V19H20V18L18 16ZM16 17H8V11C8 8.52 9.51 6.5 12 6.5C14.49 6.5 16 8.52 16 11V17Z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        let audioCtx;
        const btn = document.getElementById('doorbell-btn');
        const setupOverlay = document.getElementById('setup-overlay');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const appContainer = document.getElementById('app-container');

        // 請求全螢幕函數
        function requestFullScreen(element) {
            if (element.requestFullscreen) {
                element.requestFullscreen();
            } else if (element.webkitRequestFullscreen) { /* Safari */
                element.webkitRequestFullscreen();
            } else if (element.msRequestFullscreen) { /* IE11 */
                element.msRequestFullscreen();
            }
        }

        // 點擊「開始拍攝」按鈕：進入全螢幕並預先初始化 AudioContext
        fullscreenBtn.addEventListener('click', () => {
            // 嘗試進入全螢幕
            requestFullScreen(document.documentElement);
            
            // 初始化音效 (必須在使用者互動時建立)
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            
            // 隱藏準備畫面
            setupOverlay.style.display = 'none';
        });


        // 播放門鈴音效
        function playDingDong() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }

            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const t = audioCtx.currentTime;

            // 叮
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(783.99, t);
            gain1.gain.setValueAtTime(0, t);
            gain1.gain.linearRampToValueAtTime(1, t + 0.05);
            gain1.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start(t);
            osc1.stop(t + 1.2);

            // 咚
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(659.25, t + 0.6);
            gain2.gain.setValueAtTime(0, t + 0.6);
            gain2.gain.linearRampToValueAtTime(1, t + 0.65);
            gain2.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start(t + 0.6);
            osc2.stop(t + 2.5);
        }

        // 門鈴按鈕事件
        btn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            btn.classList.add('pressed');
            playDingDong();
        });

        window.addEventListener('pointerup', () => {
            btn.classList.remove('pressed');
        });
        
        btn.addEventListener('pointerleave', () => {
            btn.classList.remove('pressed');
        });

    </script>
</body>
</html>
